<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR CAD Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="hud">
      <h1>AR CAD Interface</h1>
      <p>Camera-powered mechanical model inspection</p>
    </header>

    <main class="layout">
      <section class="viewer-shell">
        <video id="cameraFeed" class="camera-feed" autoplay playsinline muted></video>

        <div id="loadingOverlay" class="loading-overlay active">
          <div class="spinner"></div>
          <span>Loading CAD model...</span>
        </div>

        <model-viewer
          id="arViewer"
          src="/models/gear.glb"
          alt="Mechanical CAD model"
          ar
          ar-modes="webxr scene-viewer quick-look"
          camera-controls
          touch-action="pan-y"
          auto-rotate
          shadow-intensity="1"
          exposure="1"
          interaction-prompt="none"
        ></model-viewer>

        <div class="gesture-hint" id="gestureHint">
          <span>Pinch to zoom</span>
          <span>Drag to rotate</span>
          <span>Tap model for details</span>
        </div>
      </section>

      <aside class="panel" id="infoPanel">
        <h2>Engineering Snapshot</h2>
        <div class="metric"><label>Material</label><strong id="materialValue">Steel</strong></div>
        <div class="metric"><label>Mass</label><strong id="massValue">2.3 kg</strong></div>
        <div class="metric"><label>Stress</label><strong id="stressValue">380 MPa</strong></div>
        <p class="hint" id="tapHint">Tap the model to refresh this panel.</p>
      </aside>
    </main>

    <section class="controls">
      <button id="cameraButton" class="btn">Open Camera</button>
      <button id="arButton" class="btn primary">View in Real World</button>
      <button id="updateButton" class="btn">Update Model</button>
      <button id="voiceButton" class="btn ghost">Voice Command</button>
      <p id="statusText" class="status">System ready.</p>
    </section>

    <script src="/script.js"></script>
  </body>
</html>
